<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumPulse Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-screen w-screen flex flex-col bg-[#0B0E14] text-[#d1d4dc]">

    <!-- HEADER -->
    <header class="h-20 border-b border-[#2a2e39] flex items-center justify-between px-8 bg-[#131722]">
        <div class="flex items-center space-x-4">
            <div class="bg-blue-600 p-2 rounded"><i class="fas fa-microchip text-white"></i></div>
            <div>
                <h1 class="text-xl font-bold text-white tracking-tighter uppercase italic">Quantum<span class="text-blue-500">Pulse</span></h1>
                <div class="flex items-center gap-2">
                    <div class="live-node" id="nodeStatus"></div>
                    <span id="nodeLabel" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Synchronizing Node...</span>
                </div>
            </div>
        </div>

        <div class="flex space-x-12">
            <div class="text-center">
                <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">Local Time</p>
                <p id="localTime" class="mono text-lg font-bold text-white">00:00:00</p>
            </div>
            <div class="text-center w-32">
                <p id="marketLabel" class="text-[10px] text-gray-400 font-bold uppercase mb-1">US Market</p>
                <p id="marketClock" class="mono text-lg font-bold text-blue-400">--:--:--</p>
            </div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        
        <!-- WATCHLIST -->
        <section class="w-[480px] border-r border-[#2a2e39] flex flex-col bg-[#11141b]">
            <div class="p-4 border-b border-[#2a2e39] flex justify-between items-center">
                <h3 class="text-xs font-bold text-white uppercase tracking-widest">Market Watchlist</h3>
                <div class="flex gap-2">
                    <button onclick="sortData('pct')" class="text-[10px] bg-[#2a2e39] px-3 py-1 rounded hover:bg-blue-600 transition">Sort %</button>
                </div>
            </div>

            <div class="grid grid-cols-4 px-6 py-3 text-[10px] font-bold text-gray-500 border-b border-[#2a2e39] uppercase bg-[#161a25]">
                <div>Symbol</div>
                <div class="text-right">Last Price</div>
                <div class="text-right">24H Change</div>
                <div class="text-right">Daily Range</div>
            </div>

            <div id="tableBody" class="flex-1 overflow-y-auto">
                <!-- Data rows injected by script.js -->
            </div>
        </section>

        <!-- CHARTING AREA -->
        <section class="flex-1 flex flex-col p-4 bg-[#0B0E14]">
            <div id="activeInfo" class="mb-4 p-4 border border-[#2a2e39] bg-[#131722] rounded-xl flex items-center justify-between">
                <div>
                    <h2 id="activeSym" class="text-2xl font-bold text-white">---</h2>
                    <p id="activeName" class="text-xs text-gray-500 uppercase font-bold tracking-widest">Select an Instrument</p>
                </div>
                <div class="text-right">
                    <p id="activePrice" class="text-2xl font-bold mono">---</p>
                    <p id="activePct" class="text-sm font-bold">---</p>
                </div>
            </div>
            <div id="chartContainer" class="flex-1 border border-[#2a2e39] rounded-xl overflow-hidden bg-[#131722]">
                <!-- TradingView Node -->
            </div>
        </section>
    </main>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script src="script.js"></script>
</body>
</html>
