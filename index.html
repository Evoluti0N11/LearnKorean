    const initApp = async () => {
      try {
        const configStr = typeof window.__firebase_config !== 'undefined' ? window.__firebase_config : null;
        if (configStr) {
          const config = JSON.parse(configStr);
          if (Object.keys(config).length > 0) {
            useFirebase = true;
            const appMod = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
            const authMod = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
            const fsMod = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

            const appInstance = appMod.initializeApp(config);
            auth = authMod.getAuth(appInstance);
            db = fsMod.getFirestore(appInstance);

            doc = fsMod.doc; setDoc = fsMod.setDoc; onSnapshot = fsMod.onSnapshot;
            signOut = authMod.signOut; signInAnonymously = authMod.signInAnonymously; signInWithCustomToken = authMod.signInWithCustomToken;

            authMod.onAuthStateChanged(auth, (currentUser) => {
              state.user = currentUser;
              state.isAuthLoading = false;
              renderApp();
              if (currentUser) {
                const userDocRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'data');
                onSnapshot(userDocRef, (docSnap) => {
                  if (docSnap.exists()) {
                    const data = docSnap.data();
                    state.completedDays = data.completedDays || [];
                    state.mistakesRecord = data.mistakesRecord || {};
                    if (data.profileName) state.profileName = data.profileName;
                    if(state.currentView !== 'game') renderApp();
                  }
                }, (err) => console.error(err));
              }
            });

            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
            return;
          }
        }
      } catch(e) {
        console.warn("Cloud init skipped. Local storage in uso.", e);
      }

      useFirebase = false;
      state.user = { uid: 'local-user' };
      state.isAuthLoading = false;
      loadLocalProgress();
      renderApp();
    };

      if (!textHangul) return;
      
      // Clean HTML tags if any passed accidentally
      const cleanText = textHangul.replace(/<[^>]*>?/gm, '');

      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.lang = 'ko-KR'; 
        utterance.rate = 0.85; 
        
        const voices = window.speechSynthesis.getVoices();
        const koVoices = voices.filter(v => v.lang.includes('ko'));
        if(koVoices.length > 0) {
          let bestVoice = koVoices.find(v => /Yuna|Somi|Female|Google/i.test(v.name));
          if(!bestVoice) bestVoice = koVoices[0];
          utterance.voice = bestVoice;
        }
        window.speechSynthesis.speak(utterance);
      } else {
        alert("Il tuo browser non supporta la pronuncia vocale.");
      }
    };

        if (data && data[0]) {
            data[0].forEach(item => {
                if (item[0] && typeof item[0] === 'string' && item[0] !== "null" && !item[0].match(/^[a-zA-Z\s]+$/)) {
                    koText += item[0];
                }
                if (item[2] && typeof item[2] === 'string' && /^[a-zA-Zāēīōūōōuu\-\s\'eou]+$/i.test(item[2])) {
                    romajiText += item[2];
                } else if (item[3] && typeof item[3] === 'string' && /^[a-zA-Zāēīōūōōuu\-\s\'eou]+$/i.test(item[3])) {
                    romajiText += item[3]; 
                }
            });
            
            if(!romajiText && data[0].length > 1) {
                const lastEl = data[0][data[0].length - 1];
                if(lastEl && typeof lastEl[2] === 'string') romajiText = lastEl[2];
                else if(lastEl && typeof lastEl[3] === 'string') romajiText = lastEl[3];
            }

            state.transResult = koText || "Impossibile tradurre.";
            state.transRomaji = romajiText ? romajiText.trim() : "Audio disponibile sotto";
        } else {
            state.transResult = "Impossibile tradurre.";
        }
      } catch(e) {
        state.transResult = "Errore di rete. Riprova.";
      }
      
      state.transLoading = false;
      renderApp();
    };

    window.initMap = () => {
        const container = document.getElementById('korea-map');
        if (!container) return;
        
        if (myMap !== null) {
            myMap.remove();
            myMap = null;
        }

        // Center the map covering main Korea spots
        myMap = L.map('korea-map', {
            zoomControl: false,
            scrollWheelZoom: false 
        }).setView([36.5, 127.5], 7);
        
        L.control.zoom({ position: 'topright' }).addTo(myMap);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {

      state.combo = 0;

      state.showFeedback = false;
      state.currentMistakes = [];

    };

    window.startGame = () => {
      state.currentView = 'game';
      renderApp();
    };

    window.handleMultipleChoiceAnswer = (index) => {
      if (state.showFeedback) return;
      
      const exercise = COURSE_DATA.find(d => d.day === state.activeDay).exercises[state.gameStep];
      
      if (exercise.optionsHangul && exercise.optionsHangul[index]) {
        window.playAudio(null, exercise.optionsHangul[index]);
      }

      state.selectedAnswer = index;
      state.showFeedback = true;
      
      if (index === exercise.answer) {
        state.score += 1;
        state.combo += 1; 
      } else {
        state.combo = 0; 
        state.currentMistakes.push(exercise.conceptTag);
      }
      renderApp();
    };

    // BUG FIX PER MICROFONO ANDROID CHROME
    window.handleSpeechRecognition = (e) => {
      if (e) e.preventDefault();
      if (state.selectedAnswer !== null || state.isRecording) return;

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        alert("Sara, questo browser non supporta il microfono per l'AI. Puoi usare il tasto Salta e proseguire in totale relax!");
        window.skipSpeechExercise();
        return;
      }

      const recognition = new SpeechRecognition();
      recognition.lang = 'ko-KR';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      recognition.continuous = false;
      
      state.isRecording = true;
      renderApp();

      // Implementazione Timeout di sicurezza (7 sec) per Chrome Android bug
      speechTimeout = setTimeout(() => {
          if (state.isRecording) {
              recognition.stop();
              state.isRecording = false;
              const exercise = COURSE_DATA.find(d => d.day === state.activeDay).exercises[state.gameStep];
              exercise.feedback_incorrect = "Non ho sentito nulla o c'è un blocco del microfono su Android. Riprova, oppure salta senza perdere la combo!";
              state.showFeedback = true;
              state.selectedAnswer = false; 
              renderApp();
          }
      }, 7000);

      recognition.onresult = (event) => {
        clearTimeout(speechTimeout);
        state.isRecording = false;
        let rawTranscript = event.results[0][0].transcript;
        let transcript = rawTranscript.toLowerCase().trim();
        
        const cleanTranscript = transcript.replace(/[.,!?。、！？\s~]/g, '');
        const exercise = COURSE_DATA.find(d => d.day === state.activeDay).exercises[state.gameStep];
        
        const isMatchHangul = exercise.expectedHangul.some(k => cleanTranscript.includes(k.replace(/[.,!?。、！？\s~]/g, '')));
        const isMatchRomaji = exercise.expectedRomaji.some(r => cleanTranscript.includes(r.replace(/[.,!?。、！？\s~]/g, '')));
        
        const isMatch = cleanTranscript.length > 0 && (isMatchHangul || isMatchRomaji);
        
        state.selectedAnswer = isMatch;
        state.showFeedback = true;

        if (isMatch) {
            state.score += 1;
            state.combo += 1;
        } else {
            state.combo = 0;
            exercise.feedback_incorrect = `Hai detto: "${rawTranscript}". Non sono riuscita a capirti bene, riprova scandendo meglio!`;
            state.currentMistakes.push(exercise.conceptTag);
        }
        renderApp();
      };

      recognition.onerror = (event) => {
        clearTimeout(speechTimeout);
        state.isRecording = false;
        state.showFeedback = true;
        state.selectedAnswer = false; 
        state.combo = 0;
        
        const exercise = COURSE_DATA.find(d => d.day === state.activeDay).exercises[state.gameStep];
        
        if (event.error === 'not-allowed') {
          exercise.feedback_incorrect = "Microfono bloccato! Vai nei permessi di Chrome per attivarlo, oppure usa il tasto 'Salta'.";
        } else if (event.error === 'no-speech') {
          exercise.feedback_incorrect = "Non ho sentito nulla. C'è molto rumore, hai parlato troppo piano, o il browser sta bloccando l'audio.";
        } else { 
          exercise.feedback_incorrect = "Errore di connessione audio (" + event.error + "). Sentiti libera di saltare.";
        }
        renderApp();
      };
      
      try { recognition.start(); } catch(err) { clearTimeout(speechTimeout); window.skipSpeechExercise(); }
    };

    window.skipSpeechExercise = () => {
        // Un modo sicuro per non bloccare Sara se l'API del browser fa i capricci
        if(speechTimeout) clearTimeout(speechTimeout);
        state.isRecording = false;
        const exercise = COURSE_DATA.find(d => d.day === state.activeDay).exercises[state.gameStep];
        
        // Simulo una risposta errata per permettere il passaggio, ma senza far scendere l'umore!
        state.selectedAnswer = false;

    const renderGame = () => {
      const lesson = COURSE_DATA.find(d => d.day === state.activeDay);
      const exercise = lesson.exercises[state.gameStep];
      const isAnswered = state.selectedAnswer !== null;
      
      let isCorrect = false;
      if (exercise.type === 'multiple_choice' || exercise.type === 'listen' || exercise.type === 'conversation') {
        isCorrect = isAnswered && state.selectedAnswer === exercise.answer;
      } else if (exercise.type === 'speak') {
        isCorrect = isAnswered && state.selectedAnswer === true;
      }

      const progressWidth = (state.gameStep / lesson.exercises.length) * 100;
      
      let typeLabel = 'Quiz di Comprensione';
      let typeIcon = 'brain';
      let typeColor = 'text-blue-700 bg-blue-50 border-blue-100';
      if(exercise.type === 'speak') { typeLabel = 'Esercizio di Pronuncia Vocale'; typeIcon = 'mic'; typeColor = 'text-pink-700 bg-pink-50 border-pink-100'; }
      else if(exercise.type === 'listen') { typeLabel = 'Test di Ascolto'; typeIcon = 'headphones'; typeColor = 'text-indigo-700 bg-indigo-50 border-indigo-100'; }
      else if(exercise.type === 'conversation') { typeLabel = 'Simulazione di Dialogo Reale'; typeIcon = 'message-square'; typeColor = 'text-orange-700 bg-orange-50 border-orange-100'; }

      let exerciseHtml = '';

      let contextHtml = '';
      if (exercise.type === 'conversation' && exercise.context) {
        contextHtml = `
          <div class="mb-10 w-full flex justify-start">
            <div class="chat-bubble bg-orange-50 border-2 border-orange-200 p-6 rounded-2xl rounded-bl-none shadow-sm relative w-11/12 md:w-3/4">

          </div>

      }

      if (exercise.type === 'multiple_choice' || exercise.type === 'listen' || exercise.type === 'conversation') {
        exerciseHtml = `<div class="space-y-4">` + exercise.options.map((opt, i) => {
          let btnClass = "bg-white border-2 border-gray-200 text-gray-700 hover:border-pink-400 hover:bg-pink-50";
          let iconHtml = '';
          if (isAnswered) {
            if (i === exercise.answer) {
              btnClass = "bg-green-50 border-2 border-green-500 text-green-900 shadow-md transform scale-[1.02] z-10";
              iconHtml = `<i data-lucide="check-circle-2" class="text-green-500 w-8 h-8 animate-pop"></i>`;
            } else if (i === state.selectedAnswer) {
              btnClass = "bg-rose-50 border-2 border-rose-500 text-rose-900";
              iconHtml = `<i data-lucide="x-circle" class="text-rose-500 w-8 h-8"></i>`;
            } else {
              btnClass = "bg-gray-50 border-2 border-gray-100 text-gray-400 opacity-60";
            }
          }

          let optionAudioBtn = '';
          if (exercise.optionsHangul && exercise.optionsHangul[i]) {
            optionAudioBtn = `
              <button onclick="window.playAudio(event, '${exercise.optionsHangul[i]}')" class="p-4 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-200 transition-colors shrink-0 z-10 border border-blue-100 mr-4 shadow-sm min-h-[50px] min-w-[50px] flex items-center justify-center">
                 <i data-lucide="volume-2" class="w-6 h-6"></i>
              </button>
            `;
          }

          // Rendi cliccabili tutte le opzioni con testo Hangul!
          const hasHangul = /[\u3131-\uD79D]/ugi.test(opt);
          const optionText = hasHangul ? window.renderHangul(opt) : opt;

          return `
            <div class="relative w-full rounded-[1.2rem] transition-all cursor-pointer shadow-sm hover:shadow-md min-h-[80px] flex items-center ${btnClass}" onclick="if(!${isAnswered}) window.handleMultipleChoiceAnswer(${i})">

                <span class="font-black text-xl md:text-2xl flex-grow leading-tight">${optionText}</span>

            <h2 class="text-2xl md:text-3xl lg:text-4xl font-black text-gray-800 mb-12 text-center leading-snug">
              ${exercise.question}
            </h2>

            ${exerciseHtml}
          </div>

          <div class="mt-12 transition-all duration-500 z-10 ${isAnswered ? 'opacity-100 translate-y-0 block' : 'opacity-0 translate-y-4 hidden'}">
            <div class="p-6 md:p-8 rounded-[1.5rem] flex flex-col sm:flex-row gap-5 items-start shadow-sm border-2 ${feedbackClass}">

                  <i data-lucide="${iconType}" class="w-8 h-8"></i>
              </div>
              <div class="flex-grow w-full">
                <h4 class="font-black text-2xl mb-3">${headingText}</h4>
                <p class="font-bold text-lg mb-2 text-gray-800">${isCorrect ? "Ottima risposta, vai avanti così." : exercise.feedback_incorrect}</p>
                ${!isCorrect && exercise.tip ? `<div class="bg-white/50 p-4 rounded-xl border border-white/40 mt-3 font-bold text-sm md:text-md text-gray-700 shadow-inner break-words w-full"><strong>💡 Hint del Sensei:</strong><br/>${exercise.tip}</div>` : ''}
              </div>
            </div>
            <button onclick="window.nextQuestion()" class="w-full mt-6 py-6 rounded-2xl font-black text-2xl text-white shadow-xl transition-transform transform hover:scale-[1.02] min-h-[70px] ${btnFeedClass}">
              ${btnText}
            </button>
          </div>
        </div>
      </div>
      `;
    };

    const renderResult = () => {
      const lesson = COURSE_DATA.find(d => d.day === state.activeDay);
      const total = lesson.exercises.length;
      const isPerfect = state.score === total;

      const mistakesHtml = state.currentMistakes.length > 0 
        ? `<div class="bg-rose-50 border-2 border-rose-200 text-rose-900 p-6 rounded-2xl mb-10 text-left shadow-sm">
             <span class="font-black block mb-3 text-lg flex items-center gap-2"><i data-lucide="book-open" class="w-6 h-6"></i> Concetti deboli su cui lavorare:</span>
             <ul class="list-disc pl-6 font-bold space-y-2 text-rose-800">
               ${[...new Set(state.currentMistakes)].map(m => `<li>${m}</li>`).join('')}
             </ul>
           </div>` 
        : '';

      return `
      <div class="max-w-lg mx-auto mt-12 text-center px-4 animate-pop">
        <div class="bg-white rounded-[3rem] korean-shadow p-10 md:p-16 border border-blue-50 relative overflow-hidden">
          
          <div class="absolute inset-0 z-0 pointer-events-none opacity-20 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+PGNpcmNsZSBjeD0iMjAiIGN5PSIyMCIgcj0iMiIgZmlsbD0iI2QxZDVkYiIvPjwvc3ZnPg==')]"></div>

          <div class="w-32 h-32 bg-gradient-to-br from-yellow-300 via-yellow-400 to-orange-500 text-white rounded-full flex items-center justify-center mx-auto mb-8 shadow-2xl shadow-yellow-500/40 relative z-10 animate-pop">
            <i data-lucide="trophy" class="w-16 h-16"></i>
          </div>

          ${mistakesHtml}

          <p class="text-xl font-bold text-gray-600 mb-12 leading-relaxed relative z-10">
            ${isPerfect ? "Sei stata IMPECCABILE, Sara! Zero errori, pronta per un K-Drama senza sottotitoli. 🌸" : "Ottimo sforzo! Non demordere, gli errori si sistemano con la Ripetizione Spaziata."}
          </p>
          <button onclick="window.changeView('dashboard')" class="w-full bg-gray-900 hover:bg-black text-white py-6 rounded-2xl font-black text-2xl shadow-xl transition-transform transform hover:scale-[1.02] relative z-10 flex justify-center items-center gap-3 h-20">
            <i data-lucide="map" class="w-7 h-7"></i> Salva e Torna al Percorso
          </button>
        </div>

    const renderLibrary = () => {
      let html = `
      <div class="max-w-5xl mx-auto pb-24 mt-2 md:mt-6 animate-pop">
        
        <div class="bg-white p-8 md:p-10 rounded-[2.5rem] korean-shadow border border-blue-50 mb-12 relative overflow-hidden">

          <h2 class="text-3xl font-black text-gray-900 mb-3 flex items-center gap-3">
            <div class="p-3 bg-pink-100 text-pink-600 rounded-2xl"><i data-lucide="bot" class="w-8 h-8"></i></div>

              <div class="w-full">
                 <span class="text-3xl md:text-4xl font-black text-white block mb-2" style="font-family: 'Noto Sans KR'">${window.renderHangul(state.transResult)}</span>
                 <span class="text-xl font-bold text-blue-300 tracking-wide break-words">${state.transRomaji}</span>
              </div>
              <button onclick="window.playAudio(event, '${state.transResult}')" class="bg-blue-500 hover:bg-blue-400 shadow-lg text-white p-5 rounded-full transition-transform hover:scale-110 shrink-0 w-full md:w-auto flex justify-center min-h-[64px] min-w-[64px]">
                <i data-lucide="volume-2" class="w-8 h-8"></i>
              </button>
            </div>
          ` : ''}
        </div>

        <div class="bg-gradient-to-r from-blue-400 to-pink-400 text-white rounded-[2.5rem] p-10 md:p-12 mb-12 shadow-xl text-center md:text-left relative overflow-hidden">

    const renderProfile = () => `

            <input 
              type="text" 
              value="${state.profileName}"
              onchange="window.updateProfileName(this.value)"
              class="w-full border-2 border-gray-200 rounded-2xl p-5 text-2xl font-black text-gray-800 focus:border-pink-500 outline-none transition-colors shadow-inner bg-gray-50 focus:bg-white min-h-[60px]"
            />
          </div>

              <p class="text-gray-400 text-xs font-black uppercase tracking-widest mb-1">Giorni Completati</p>
              <p class="text-5xl font-black text-pink-400">${state.completedDays.length}</p>
