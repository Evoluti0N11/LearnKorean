      { hangul: "피씨방", romaji: "pissibang", eng: "PC Bang (sala gaming)", category: "🎮 Gaming" },
      { hangul: "노라에방", romaji: "noraeбang", eng: "Karaoke privato", category: "🎵 Musica" },
      { hangul: "고양이", romaji: "goyangi", eng: "Gatto", category: "🐱 Vita" },
      { hangul: "삼겹살", romaji: "samgyeopsal", eng: "Pancetta grigliata (K-BBQ)", category: "🍖 Cibo" },
      { hangul: "소주", romaji: "soju", eng: "Soju (alcolico coreano)", category: "🍶 Cibo" },
      { hangul: "운동", romaji: "undong", eng: "Allenamento/Esercizio", category: "💪 Gym" },
      { hangul: "파티션", romaji: "patisyeon", eng: "Lane partner (LoL)", category: "🎮 Gaming" },
      { hangul: "남자친구", romaji: "namjachingu", eng: "Fidanzato", category: "❤️ Kdrama" },
    ];

    // Compute streak from completedDays
    const computeStreak = (completedDays) => {
      if (!completedDays || completedDays.length === 0) return 0;
      const sorted = [...completedDays].sort((a, b) => a - b);
      let streak = 1;
      for (let i = sorted.length - 1; i > 0; i--) {
        if (sorted[i] === sorted[i-1] + 1) streak++;
        else break;
      }
      return streak;
    };

    // Compute XP from completedDays and mistakesRecord
    const computeXP = (completedDays, mistakesRecord) => {
      let xp = 0;
      completedDays.forEach(d => {
        const mistakes = (mistakesRecord[d] || []).length;
        xp += mistakes === 0 ? 120 : 80; // Bonus XP for perfect days
      });
      return xp;
    };

    const getXPLevel = (xp) => {
      if (xp < 200) return { level: 1, title: "🌱 Principiante", next: 200 };
      if (xp < 500) return { level: 2, title: "🌸 Studente", next: 500 };
      if (xp < 1000) return { level: 3, title: "⚔️ Avventuriera", next: 1000 };
      if (xp < 2000) return { level: 4, title: "🎮 Semi-Pro", next: 2000 };
      if (xp < 3500) return { level: 5, title: "🏆 Esperta", next: 3500 };
      return { level: 6, title: "👑 Campionessa Coreana", next: null };
    };

    // Check which locations newly unlocked after completing a day
    const checkMapUnlocks = (newCompletedDays, prevCompletedDays) => {
      const newUnlocks = [];
      MAP_REGIONS.forEach(r => {
        if (newCompletedDays.includes(r.unlocksAtDay) && !prevCompletedDays.includes(r.unlocksAtDay)) {
          newUnlocks.push(r);
        }
      });
      return newUnlocks;
    };

    // --- LOGIC & LOCAL SAVE ---
    const loadLocalProgress = () => {
      try {
        const saved = localStorage.getItem('sara_korean_save_v3');
        // Migrate from v2
        if (!saved) {
          const oldSave = localStorage.getItem('sara_korean_save_v2');
          if (oldSave) {
            const old = JSON.parse(oldSave);
            state.completedDays = old.completedDays || [];
            state.mistakesRecord = old.mistakesRecord || {};
            if (old.profileName) state.profileName = old.profileName;
            if (old.hangulScale) { state.hangulScale = old.hangulScale; document.documentElement.style.setProperty('--hangul-scale', state.hangulScale); }
            state.mapUnlockSeen = state.completedDays.flatMap(d => MAP_REGIONS.filter(r => r.unlocksAtDay <= d).map(r => r.name));
          }
        } else {
          const data = JSON.parse(saved);
          state.completedDays = data.completedDays || [];
          state.mistakesRecord = data.mistakesRecord || {};
          if (data.profileName) state.profileName = data.profileName;
          if (data.hangulScale) { state.hangulScale = data.hangulScale; document.documentElement.style.setProperty('--hangul-scale', state.hangulScale); }
          state.mapUnlockSeen = data.mapUnlockSeen || [];
        }
        state.streak = computeStreak(state.completedDays);
        state.xp = computeXP(state.completedDays, state.mistakesRecord);
        // Set daily word of the day based on date
        const dayOfYear = Math.floor(Date.now() / 86400000);
        state.wotdIndex = dayOfYear % WOTD_POOL.length;
      } catch(e) { console.error("Local storage error", e); }
    };

    const showSaveToast = (msg = "Progressi Salvati, Sara!", isError = false) => {
      const toast = document.createElement('div');
      const bg = isError ? 'bg-red-500' : 'bg-green-500';
      const icon = isError ? 'alert-triangle' : 'check-circle';
      toast.className = `fixed top-5 left-1/2 transform -translate-x-1/2 ${bg} text-white px-6 py-3 rounded-full shadow-2xl z-[10000] transition-all duration-300 text-sm font-bold flex items-center gap-2 animate-pop border border-white/20`;
      toast.innerHTML = `<i data-lucide="${icon}" class="w-4 h-4 text-white"></i> ${msg}`;
      document.body.appendChild(toast);
      lucide.createIcons();
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translate(-50%, -20px)';
        setTimeout(() => toast.remove(), 300);
      }, 2500);
    };

    const initApp = async () => {
      try {
        const configStr = typeof window.__firebase_config !== 'undefined' ? window.__firebase_config : null;
        if (configStr) {
          const config = JSON.parse(configStr);
          if (Object.keys(config).length > 0) {
            useFirebase = true;
            const appMod = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
            const authMod = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
            const fsMod = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

            const appInstance = appMod.initializeApp(config);
            auth = authMod.getAuth(appInstance);
            db = fsMod.getFirestore(appInstance);

            doc = fsMod.doc; setDoc = fsMod.setDoc; onSnapshot = fsMod.onSnapshot;
            signOut = authMod.signOut; signInAnonymously = authMod.signInAnonymously; signInWithCustomToken = authMod.signInWithCustomToken;

            authMod.onAuthStateChanged(auth, (currentUser) => {
              state.user = currentUser;
              state.isAuthLoading = false;
              renderApp();
              if (currentUser) {
                const userDocRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'data');
                onSnapshot(userDocRef, (docSnap) => {
                  if (docSnap.exists()) {
                    const data = docSnap.data();
                    state.completedDays = data.completedDays || [];
                    state.mistakesRecord = data.mistakesRecord || {};
                    if (data.profileName) state.profileName = data.profileName;
                    if (data.hangulScale) {
                       state.hangulScale = data.hangulScale;
                       document.documentElement.style.setProperty('--hangul-scale', state.hangulScale);
                    }
                    if(state.currentView !== 'game') renderApp();
                  }
                }, (err) => console.error(err));
              }
            });

            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
            return;
          }
        }
      } catch(e) {
        console.warn("Cloud init skipped. Local storage in uso.", e);
      }

      useFirebase = false;
      state.user = { uid: 'local-user' };
      state.isAuthLoading = false;
      loadLocalProgress();
      renderApp();
    };

    const saveProgress = async (newCompleted, newMistakes) => {
      state.streak = computeStreak(newCompleted);
      state.xp = computeXP(newCompleted, newMistakes);
      if (useFirebase && state.user && state.user.uid !== 'local-user') {
        try {
          const userDocRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'profile', 'data');
          await setDoc(userDocRef, {
            completedDays: newCompleted,
            mistakesRecord: newMistakes,
            profileName: state.profileName,
            hangulScale: state.hangulScale,
            mapUnlockSeen: state.mapUnlockSeen,
            lastUpdated: new Date().toISOString()
          }, { merge: true });
        } catch (e) { console.error("Failed to save:", e); }
      } else {
        localStorage.setItem('sara_korean_save_v3', JSON.stringify({
          completedDays: newCompleted,
          mistakesRecord: newMistakes,
          profileName: state.profileName,
          hangulScale: state.hangulScale,
          mapUnlockSeen: state.mapUnlockSeen,
        }));
        showSaveToast();
      }
    };

    // --- SECRET UNLOCK FEATURE ---
    window.unlockDayWithCode = (code) => {
        window.haptic();
        if(!code || code.length < 4) return;
        const upperCode = code.toUpperCase().trim();
        const foundDayIndex = window._s_k_d.indexOf(upperCode);
        
        if(foundDayIndex > 0 && foundDayIndex <= 45) {
            if(!state.completedDays.includes(foundDayIndex)) {
                const newDays = [...state.completedDays];
                for(let i=1; i<=foundDayIndex; i++) {
                   if(!newDays.includes(i)) newDays.push(i);
                }
                state.completedDays = newDays;
                saveProgress(newDays, state.mistakesRecord);
                showSaveToast(`Livello ${foundDayIndex} sbloccato! Magia! ✨`);
                document.getElementById('unlockCodeInput').value = '';
                renderApp();
            } else {
                showSaveToast("Hai già sbloccato questo livello!", true);
            }
        } else {
            showSaveToast("Codice Segreto non valido! Riprova.", true);
        }
    };

    // --- AUDIO & TRANSLATION ---
    window.playAudio = (e, textHangul) => {
      if (e) { e.stopPropagation(); e.preventDefault(); }
      window.haptic(30);
      if (!textHangul) return;
      
      const cleanText = textHangul.replace(/<[^>]*>?/gm, '');

      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.lang = 'ko-KR'; 
        utterance.rate = 0.85; 
        
        const voices = window.speechSynthesis.getVoices();
        const koVoices = voices.filter(v => v.lang.includes('ko'));
        if(koVoices.length > 0) {
          let bestVoice = koVoices.find(v => /Yuna|Somi|Female|Google/i.test(v.name));
          if(!bestVoice) bestVoice = koVoices[0];
          utterance.voice = bestVoice;
        }
        window.speechSynthesis.speak(utterance);
      } else {
        showSaveToast("Il tuo browser non supporta la pronuncia.", true);
      }
    };

    window.runTranslation = async () => {
      window.haptic();
      const inputEl = document.getElementById('transInput');
      if (!inputEl || !inputEl.value.trim()) return;
      
      const text = inputEl.value.trim();
      state.transLoading = true;
      state.transResult = "Traducendo...";
      state.transRomaji = "";
      renderApp();

      try {
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=it&tl=ko&dt=t&dt=rm&q=${encodeURIComponent(text)}`;
        const res = await fetch(url);
        const data = await res.json();
        
        let koText = "";
        let romajiText = "";

        if (data && data[0]) {
            data[0].forEach(item => {
                if (item[0] && typeof item[0] === 'string' && item[0] !== "null" && !item[0].match(/^[a-zA-Z\s]+$/)) {
                    koText += item[0];
                }
                if (item[2] && typeof item[2] === 'string' && /^[a-zA-Zāēīōūōōuu\-\s\'eou]+$/i.test(item[2])) {
                    romajiText += item[2];
                } else if (item[3] && typeof item[3] === 'string' && /^[a-zA-Zāēīōūōōuu\-\s\'eou]+$/i.test(item[3])) {
                    romajiText += item[3]; 
                }
            });
            
            if(!romajiText && data[0].length > 1) {
                const lastEl = data[0][data[0].length - 1];
                if(lastEl && typeof lastEl[2] === 'string') romajiText = lastEl[2];
                else if(lastEl && typeof lastEl[3] === 'string') romajiText = lastEl[3];
            }

            state.transResult = koText || "Impossibile tradurre.";
            state.transRomaji = romajiText ? romajiText.trim() : "Audio disponibile sotto";
        } else {
            state.transResult = "Impossibile tradurre.";
        }
      } catch(e) {
        state.transResult = "Errore di rete. Riprova.";
        showSaveToast("Errore di rete durante la traduzione.", true);
      }
      
      state.transLoading = false;
      renderApp();
    };

    window.initMap = () => {
        const container = document.getElementById('korea-map');
        if (!container) return;
        
        if (myMap !== null) {
            myMap.remove();
            myMap = null;
        }

        myMap = L.map('korea-map', {
            zoomControl: false,
            scrollWheelZoom: false 
        }).setView([36.5, 127.5], 7);
        
        L.control.zoom({ position: 'topright' }).addTo(myMap);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap',
            className: 'map-tiles'
        }).addTo(myMap);

        MAP_REGIONS.forEach(region => {
            const isUnlocked = state.completedDays.includes(region.unlocksAtDay);
            const isJustUnlocked = state.newlyUnlockedLocation && state.newlyUnlockedLocation.name === region.name;
            
            const iconClass = isUnlocked ? 'custom-map-icon' : 'custom-map-icon map-icon-locked';
            const borderColor = isJustUnlocked ? 'border-green-400' : (isUnlocked ? 'border-pink-400' : 'border-gray-300');
            const glowClass = isJustUnlocked ? 'unlock-glow' : (isUnlocked ? 'animate-bounce-slow' : '');

            const icon = L.divIcon({
                className: iconClass,
                html: isUnlocked 
                  ? `<div class="${glowClass} border-4 ${borderColor}" onclick="window.haptic(20)" title="${region.name}">${region.icon}</div>`
                  : `<div class="border-4 ${borderColor}" title="Sblocca completando il Giorno ${region.unlocksAtDay}">🔒</div>`,
                iconSize: [44, 44],
                iconAnchor: [22, 22],
                popupAnchor: [0, -22]
            });

            const marker = L.marker([region.lat, region.lng], {icon: icon}).addTo(myMap);
            
            if (isUnlocked) {
              marker.bindPopup(`
                <div class="p-0 text-center min-w-[260px] flex flex-col items-center">
                    <img src="${region.image}" alt="${region.name}" class="w-full h-32 object-cover rounded-t-xl mb-3 shadow-sm border-b-2 border-pink-100" onerror="this.src='https://images.unsplash.com/photo-1517154421773-0529f29ea451?w=600&q=80'" />
                    <div class="px-3 pb-3 w-full">
                      <h3 class="font-black text-lg text-gray-800 mb-1 leading-tight">${region.name}</h3>
                      <p class="text-xs font-bold text-gray-600 mb-2">${region.desc}</p>
                      <div class="flex flex-wrap justify-center gap-1 mb-3">
                          ${region.keywords.map(kw => `<span class="bg-blue-50 text-blue-600 px-2 py-1 rounded-md text-[10px] font-black uppercase">${kw}</span>`).join('')}
                      </div>
                      ${region.phrases ? `
                      <div class="bg-pink-50 border border-pink-100 rounded-xl p-2.5 text-left">
                        <p class="text-[10px] font-black text-pink-500 uppercase tracking-widest mb-2 flex items-center gap-1">🗣️ Frasi Utili Qui</p>
                        ${region.phrases.map(ph => `
                          <div class="flex items-center justify-between gap-2 mb-1.5">
                            <div>
                              <p class="text-sm font-black text-gray-800" style="font-family:'Noto Sans KR'">${ph.hangul}</p>
                              <p class="text-[10px] text-blue-500 font-bold">${ph.romaji}</p>
                              <p class="text-[10px] text-gray-500 font-bold">${ph.eng}</p>
                            </div>
                            <button onclick="window.playAudio(event,'${ph.hangul}')" class="shrink-0 bg-white border border-pink-200 text-pink-500 p-1.5 rounded-full shadow-sm hover:bg-pink-50 transition-all">🔊</button>
                          </div>
                        `).join('<hr class="border-pink-100 my-1">')}
                      </div>
                      ` : ''}
                    </div>
                </div>
              `);
            } else {
              marker.bindPopup(`
                <div class="p-4 text-center min-w-[200px]">
                  <div class="text-4xl mb-2">🔒</div>
                  <h3 class="font-black text-base text-gray-800 mb-1">${region.name}</h3>
                  <p class="text-xs font-bold text-gray-500 mb-3">${region.desc.substring(0, 60)}...</p>
                  <div class="bg-pink-50 border border-pink-100 rounded-xl px-3 py-2">
                    <p class="text-xs font-black text-pink-600">Completa il Giorno ${region.unlocksAtDay} per sbloccare!</p>
                  </div>
                </div>
              `);
            }
        });
    };

    // --- GLOBAL ACTIONS WITH LOADING TRANSITION ---
    window.changeView = (view) => {
      window.haptic(20);
      state.isTransitioning = true;
      renderApp();
      setTimeout(() => {
          state.currentView = view;
          state.isTransitioning = false;
          renderApp();
      }, 300); // 300ms App-like fade transition
    };

    window.startDay = (dayNum) => {
      window.haptic(40);
      state.isTransitioning = true;
      renderApp();
      setTimeout(() => {
          state.activeDay = dayNum;
          state.currentView = 'theory';
          state.gameStep = 0;
          state.score = 0;
          state.combo = 0;
          state.selectedAnswer = null;
          state.showFeedback = false;
          state.fallbackActive = false;
          state.currentMistakes = [];
          state.isTransitioning = false;
          renderApp();
      }, 300);
    };

    window.startGame = () => {
      window.haptic(40);
      state.isTransitioning = true;
      renderApp();
      setTimeout(() => {
          state.currentView = 'game';
          state.isTransitioning = false;
          renderApp();
      }, 300);
    };

    window.handleMultipleChoiceAnswer = (index) => {
      if (state.showFeedback) return;
      
      const exercise = COURSE_DATA.find(d => d.day === state.activeDay).exercises[state.gameStep];
      
      if (exercise.optionsHangul && exercise.optionsHangul[index]) {
        window.playAudio(null, exercise.optionsHangul[index]);
      }

      state.selectedAnswer = index;
      state.showFeedback = true;
      
      if (index === exercise.answer) {
        state.score += 1;
        state.combo += 1; 
        window.haptic([30, 50, 30]); // Success vibration
      } else {
        state.combo = 0; 
        state.currentMistakes.push(exercise.conceptTag);
        window.haptic(100); // Error vibration
      }
      renderApp();
    };

    // --- FALLBACK VOCALE (QUIZ FONETICO) ---
    window.triggerSpeechFallback = () => {
        window.haptic();
        if(speechTimeout) clearTimeout(speechTimeout);
        state.isRecording = false;
        state.fallbackActive = true;
        
        const ex = COURSE_DATA.find(d => d.day === state.activeDay).exercises[state.gameStep];
        const correct = ex.expectedRomaji[0];
        
        // Genera distrattori credibili ma palesemente errati
        const opt1 = correct.replace(/[aeiou]/g, (m) => m==='a'?'e':m==='e'?'i':m==='i'?'o':m==='o'?'u':'a');
        const opt2 = correct.replace(/k|g|t|d|p|b|j/g, (m) => m==='k'?'g':m==='g'?'k':m==='t'?'d':m==='d'?'t':m==='p'?'b':'p').replace(/[aeiou]/g, 'a');
        
        const options = [correct, opt1, opt2];
        state.fallbackOptions = options.sort(() => Math.random() - 0.5);
        renderApp();
    };

    window.handleFallbackAnswer = (index) => {
       if (state.showFeedback) return;
       const ex = COURSE_DATA.find(d => d.day === state.activeDay).exercises[state.gameStep];
       const correct = ex.expectedRomaji[0];
       const isCorrect = state.fallbackOptions[index] === correct;
       
       if(isCorrect) {
          window.playAudio(null, ex.expectedHangul[0]);
          state.selectedAnswer = true;
          state.score += 1;
          state.combo += 1;
          state.showFeedback = true;
          window.haptic([30, 50, 30]);
          ex.feedback_incorrect = "Bravissima! L'audio che hai appena sentito è la pronuncia esatta. L'Hai riconosciuta perfettamente.";
       } else {
          state.selectedAnswer = false;
          state.combo = 0;
          state.currentMistakes.push(ex.conceptTag);
          state.showFeedback = true;
          window.haptic(100);
          ex.feedback_incorrect = `Quella non era la pronuncia esatta. La romanizzazione corretta era: "${correct}". Ascoltala bene la prossima volta!`;
       }
       renderApp();
    };

    // BUG FIX PER MICROFONO ANDROID CHROME
    window.handleSpeechRecognition = (e) => {
      if (e) e.preventDefault();
      if (state.selectedAnswer !== null || state.isRecording) return;
      window.haptic(50);

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        window.triggerSpeechFallback();
        return;
      }

      const recognition = new SpeechRecognition();
      recognition.lang = 'ko-KR';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      recognition.continuous = false;
      
      state.isRecording = true;
      renderApp();

      // Timeout di sicurezza (7 sec) -> Passa al Fallback
      speechTimeout = setTimeout(() => {
          if (state.isRecording) {
              recognition.stop();
              window.triggerSpeechFallback();
          }
      }, 7000);

      recognition.onresult = (event) => {
        clearTimeout(speechTimeout);
        state.isRecording = false;
        let rawTranscript = event.results[0][0].transcript;
        let transcript = rawTranscript.toLowerCase().trim();
        
        const cleanTranscript = transcript.replace(/[.,!?。、！？\s~]/g, '');
        const exercise = COURSE_DATA.find(d => d.day === state.activeDay).exercises[state.gameStep];
        
        const isMatchHangul = exercise.expectedHangul.some(k => cleanTranscript.includes(k.replace(/[.,!?。、！？\s~]/g, '')));
        const isMatchRomaji = exercise.expectedRomaji.some(r => cleanTranscript.includes(r.replace(/[.,!?。、！？\s~]/g, '')));
        
        const isMatch = cleanTranscript.length > 0 && (isMatchHangul || isMatchRomaji);
        
        state.selectedAnswer = isMatch;
        state.showFeedback = true;

        if (isMatch) {
            state.score += 1;
            state.combo += 1;
            window.haptic([30, 50, 30]);
        } else {
            state.combo = 0;
            window.haptic(100);
            exercise.feedback_incorrect = `Hai detto: "${rawTranscript}". Non sono riuscita a capirti bene, riprova scandendo meglio!`;
            state.currentMistakes.push(exercise.conceptTag);
        }
        renderApp();
      };

      recognition.onerror = (event) => {
        clearTimeout(speechTimeout);
        if(event.error === 'not-allowed' || event.error === 'no-speech') {
            window.triggerSpeechFallback();
        } else {
            state.isRecording = false;
            state.showFeedback = true;
            state.selectedAnswer = false; 
            state.combo = 0;
            const exercise = COURSE_DATA.find(d => d.day === state.activeDay).exercises[state.gameStep];
            exercise.feedback_incorrect = "Errore microfono (" + event.error + "). Passa al prossimo.";
            renderApp();
        }
      };
      
      try { recognition.start(); } catch(err) { clearTimeout(speechTimeout); window.triggerSpeechFallback(); }
    };

    window.nextQuestion = () => {
      window.haptic(20);
      const currentLesson = COURSE_DATA.find(d => d.day === state.activeDay);
      if (state.gameStep < currentLesson.exercises.length - 1) {
        state.gameStep += 1;
        state.selectedAnswer = null;
        state.showFeedback = false;
        state.fallbackActive = false;
        state.fallbackOptions = [];
      } else {
        const prevCompleted = [...state.completedDays];
        const newCompleted = state.completedDays.includes(state.activeDay) ? state.completedDays : [...state.completedDays, state.activeDay];
        const newMistakes = { ...state.mistakesRecord, [state.activeDay]: state.currentMistakes };

                 <div>
                    <div class="flex justify-between text-[10px] md:text-xs font-bold text-gray-500 mb-1"><span>Passioni & Hobby</span> <span>${Math.min(passioni, 100)}%</span></div>
                    <div class="w-full bg-gray-200 rounded-full h-1.5 md:h-2"><div class="bg-green-500 h-1.5 md:h-2 rounded-full" style="width: ${Math.min(passioni, 100)}%"></div></div>
                 </div>
             </div>
          </div>

          <div class="text-left mb-8 md:mb-10 p-5 md:p-6 rounded-2xl md:rounded-3xl border border-gray-200">
             <label class="block text-[10px] md:text-sm font-black text-gray-800 mb-1.5 md:mb-2 uppercase tracking-widest flex items-center gap-2"><i data-lucide="zoom-in" class="w-4 h-4 md:w-5 md:h-5"></i> Grandezza Testo Coreano</label>
             <p class="text-[10px] md:text-xs text-gray-500 font-bold mb-3 md:mb-4 leading-relaxed">Se i caratteri ti sembrano troppo piccoli sul telefono, usa questo slider per ingrandirli in tutta l'app.</p>
             <div class="flex gap-3 md:gap-4 items-center">
                 <span class="text-xs md:text-sm font-black text-gray-400">가</span>
                 <input type="range" min="1" max="1.6" step="0.1" value="${state.hangulScale || 1}" onchange="window.updateHangulSize(this.value)" class="flex-grow" />
                 <span class="text-xl md:text-2xl font-black text-pink-500">가</span>
             </div>
          </div>

          <div class="text-left mb-8 md:mb-10 bg-pink-50 p-5 md:p-6 rounded-2xl md:rounded-3xl border border-pink-100">
             <label class="block text-[10px] md:text-sm font-black text-pink-600 mb-1.5 md:mb-2 uppercase tracking-widest flex items-center gap-2"><i data-lucide="unlock" class="w-3 h-3 md:w-4 md:h-4"></i> Inserisci Codice Sblocco</label>
             <p class="text-[10px] md:text-xs text-pink-500 font-bold mb-2 md:mb-3 leading-relaxed">Usa il codice segreto fornito dall'amministratore per sincronizzare il livello!</p>
             <div class="flex gap-2">
                 <input type="text" id="unlockCodeInput" placeholder="es. SR20K" class="w-full border-2 border-pink-200 rounded-xl md:rounded-xl p-2 md:p-3 text-base md:text-lg font-bold text-gray-800 focus:border-pink-500 outline-none uppercase font-mono shadow-inner min-h-[44px] md:min-h-[50px]" />
                 <button onclick="window.unlockDayWithCode(document.getElementById('unlockCodeInput').value)" class="bg-pink-500 hover:bg-pink-600 text-white px-4 md:px-5 rounded-xl font-bold shadow-md min-h-[44px] md:min-h-[50px] outline-none"><i data-lucide="arrow-right" class="w-5 h-5 md:w-6 md:h-6"></i></button>
             </div>
          </div>

          <div class="bg-gray-900 p-6 md:p-8 rounded-2xl md:rounded-3xl mb-8 md:mb-12 flex justify-between items-center text-left shadow-xl">
            <div>
              <p class="text-gray-400 text-[10px] md:text-xs font-black uppercase tracking-widest mb-1">Giorni Completati</p>
              <p class="text-4xl md:text-5xl font-black text-pink-400">${state.completedDays.length}</p>
            </div>
            <i data-lucide="award" class="text-yellow-400 w-12 h-12 md:w-16 md:h-16"></i>
          </div>

          <button onclick="window.handleSwitchAccount()" class="w-full bg-white border-2 border-gray-200 hover:bg-red-50 hover:border-red-300 hover:text-red-600 text-gray-500 py-4 md:py-5 rounded-xl md:rounded-2xl font-black text-base md:text-lg shadow-sm transition-all flex justify-center items-center gap-2 md:gap-3 min-h-[50px] md:min-h-[60px] outline-none">
            <i data-lucide="trash-2" class="w-5 h-5 md:w-6 md:h-6"></i> Resetta Percorso
          </button>
        </div>
      </div>
      `;
    };

    // Boot App
    initApp();

  </script>

  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then((reg) => console.log('Service Worker registrato con successo!', reg.scope))
        .catch((err) => console.warn('Errore registrazione Service Worker', err));
    });
  }
  </script>
</body>
</html>
