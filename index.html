      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(textHangul);
        utterance.lang = 'ko-KR'; 
        utterance.rate = 0.85; 
        
        const voices = window.speechSynthesis.getVoices();
        const koVoices = voices.filter(v => v.lang.includes('ko'));
        if(koVoices.length > 0) {
          let bestVoice = koVoices.find(v => /Yuna|Somi|Female|Google/i.test(v.name));
          if(!bestVoice) bestVoice = koVoices[0];
          utterance.voice = bestVoice;
        }
        window.speechSynthesis.speak(utterance);
      } else {
        alert("Il tuo browser non supporta la pronuncia vocale.");
      }
    };

    window.runTranslation = async () => {
      const inputEl = document.getElementById('transInput');
      if (!inputEl || !inputEl.value.trim()) return;
      
      const text = inputEl.value.trim();
      state.transLoading = true;
      state.transResult = "Traducendo...";
      state.transRomaji = "";
      renderApp();

      try {
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=it&tl=ko&dt=t&dt=rm&q=${encodeURIComponent(text)}`;
        const res = await fetch(url);
        const data = await res.json();
        
        let koText = "";
        let romajiText = "";

        if (data && data[0]) {
            data[0].forEach(item => {
                if (item[0] && typeof item[0] === 'string' && item[0] !== "null" && !item[0].match(/^[a-zA-Z\s]+$/)) {
                    koText += item[0];
                }
                if (item[2] && typeof item[2] === 'string' && /^[a-zA-Zāēīōūōōuu\-\s\'eou]+$/i.test(item[2])) {
                    romajiText += item[2];
                } else if (item[3] && typeof item[3] === 'string' && /^[a-zA-Zāēīōūōōuu\-\s\'eou]+$/i.test(item[3])) {
                    romajiText += item[3]; 
                }
            });
            
            if(!romajiText && data[0].length > 1) {
                const lastEl = data[0][data[0].length - 1];
                if(lastEl && typeof lastEl[2] === 'string') romajiText = lastEl[2];
                else if(lastEl && typeof lastEl[3] === 'string') romajiText = lastEl[3];
            }

            state.transResult = koText || "Impossibile tradurre.";
            state.transRomaji = romajiText ? romajiText.trim() : "Audio disponibile sotto";
        } else {
            state.transResult = "Impossibile tradurre.";
        }
      } catch(e) {
        state.transResult = "Errore di rete. Riprova.";
      }
      
      state.transLoading = false;
      renderApp();
    };

    window.initMap = () => {
        const container = document.getElementById('korea-map');
        if (!container) return;
        
        if (myMap !== null) {
            myMap.remove();

        myMap = L.map('korea-map', {
            zoomControl: false,
            scrollWheelZoom: false

        L.control.zoom({ position: 'topright' }).addTo(myMap);

                    <div class="flex flex-wrap justify-center gap-1">
                        ${region.keywords.map(kw => `<span class="bg-blue-50 text-blue-600 px-2 py-1 rounded-md text-[10px] font-black uppercase">${kw}</span>`).join('')}

      state.selectedAnswer = null;

      state.currentMistakes = [];
      renderApp();
    };

    window.startGame = () => {
      state.currentView = 'game';
      renderApp();
    };

    window.handleMultipleChoiceAnswer = (index) => {
      if (state.showFeedback) return;
      
      const exercise = COURSE_DATA.find(d => d.day === state.activeDay).exercises[state.gameStep];
      
      if (exercise.optionsHangul && exercise.optionsHangul[index]) {
        window.playAudio(null, exercise.optionsHangul[index]);
      }

      state.selectedAnswer = index;
      state.showFeedback = true;
      
      if (index === exercise.answer) {
        state.score += 1;
        state.combo += 1; 
      } else {
        state.combo = 0; 
        state.currentMistakes.push(exercise.conceptTag);
      }
      renderApp();
    };

    window.handleSpeechRecognition = (e) => {
      if (e) e.preventDefault();
      if (state.selectedAnswer !== null || state.isRecording) return;

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        alert("Riconoscimento vocale non supportato nel tuo browser. Saltiamo questo esercizio per ora!");
        state.score += 1;
        state.selectedAnswer = true;
        state.showFeedback = true;
        renderApp();
        return;
      }

      const recognition = new SpeechRecognition();
      recognition.lang = 'ko-KR';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      
      state.isRecording = true;
      renderApp();

      recognition.onresult = (event) => {
        state.isRecording = false;
        let rawTranscript = event.results[0][0].transcript;
        let transcript = rawTranscript.toLowerCase().trim();
        
        const cleanTranscript = transcript.replace(/[.,!?。、！？\s]/g, '');
        const exercise = COURSE_DATA.find(d => d.day === state.activeDay).exercises[state.gameStep];
        
        const isMatchHangul = exercise.expectedHangul.some(k => cleanTranscript.includes(k.replace(/[.,!?。、！？\s]/g, '')));
        const isMatchRomaji = exercise.expectedRomaji.some(r => cleanTranscript.includes(r.replace(/[.,!?。、！？\s]/g, '')));
        
        const isMatch = cleanTranscript.length > 0 && (isMatchHangul || isMatchRomaji);
        
        state.selectedAnswer = isMatch;
        state.showFeedback = true;

        if (isMatch) {
            state.score += 1;
            state.combo += 1;
        } else {
            state.combo = 0;
            exercise.feedback_incorrect = `Hai detto: "${rawTranscript}". Riprova, concentrati sulla pronuncia!`;
            state.currentMistakes.push(exercise.conceptTag);
        }
        renderApp();
      };

      recognition.onerror = (event) => {
        state.isRecording = false;
        state.showFeedback = true;
        state.selectedAnswer = false; 
        state.combo = 0;
        
        const exercise = COURSE_DATA.find(d => d.day === state.activeDay).exercises[state.gameStep];
        
        if (event.error === 'not-allowed') {
          exercise.feedback_incorrect = "Microfono bloccato. Permetti l'accesso al microfono!";
        } else if (event.error === 'no-speech') {
          exercise.feedback_incorrect = "Nessun suono rilevato. Parla chiaramente nel microfono.";
        } else { 
          exercise.feedback_incorrect = "Errore: " + event.error;
        }
        renderApp();
      };
      
      recognition.start();
    };

      const currentLesson = COURSE_DATA.find(d => d.day === state.activeDay);
      if (state.gameStep < currentLesson.exercises.length - 1) {

        state.showFeedback = false;

          </div>
          
          <div class="p-6 md:p-12 space-y-12 text-gray-700 text-lg">
            <div class="flex gap-5 items-start bg-pink-50 p-8 rounded-[1.5rem] border border-pink-100 shadow-sm">
              <i data-lucide="quote" class="text-pink-500 shrink-0 mt-1 w-10 h-10"></i>
              <p class="leading-relaxed font-bold text-pink-900 text-xl">${lesson.theory.intro}</p>
            </div>

            <div>
              <h3 class="font-black text-gray-800 mb-6 flex items-center gap-3 text-2xl">
                <div class="p-2 bg-blue-100 rounded-xl text-blue-600"><i data-lucide="brain" class="w-6 h-6"></i></div> 
                Il Concetto Base
              </h3>
              <p class="text-gray-600 font-bold leading-relaxed text-xl">${lesson.theory.concept}</p>
            </div>

            <div>
              <h3 class="font-black text-gray-800 mb-6 text-2xl border-b-2 pb-3 border-gray-100">Frasi Chiave 📝</h3>
              <div class="space-y-6">
                ${examplesHtml}
              </div>
            </div>

            <div class="bg-green-50 rounded-[1.5rem] p-8 border border-green-100 flex gap-5 items-start shadow-sm">
              <i data-lucide="leaf" class="text-green-600 shrink-0 mt-1 w-10 h-10"></i>
              <div>
                <h3 class="font-black text-green-900 mb-2 text-xl">Dettaglio Culturale 🎎</h3>
                <p class="text-green-800 font-bold leading-relaxed">${lesson.theory.culture}</p>
              </div>
            </div>
          </div>

          <div class="p-6 md:p-10 bg-gray-50 border-t-2 border-gray-100 flex justify-end">
            <button onclick="window.startGame()" class="bg-pink-500 hover:bg-pink-600 text-white px-10 py-5 rounded-2xl font-black text-xl shadow-lg shadow-pink-500/30 flex items-center justify-center gap-3 transition-transform transform hover:scale-105 w-full md:w-auto">
              Inizia la Pratica (${lesson.exercises.length} Es) <i data-lucide="play-circle" class="w-7 h-7"></i>
            </button>
          </div>
        </div>
      </div>
      `;
    };

    const renderGame = () => {
      const lesson = COURSE_DATA.find(d => d.day === state.activeDay);
      const exercise = lesson.exercises[state.gameStep];
      const isAnswered = state.selectedAnswer !== null;
      
      let isCorrect = false;
      if (exercise.type === 'multiple_choice' || exercise.type === 'listen' || exercise.type === 'conversation') {
        isCorrect = isAnswered && state.selectedAnswer === exercise.answer;
      } else if (exercise.type === 'speak') {
        isCorrect = isAnswered && state.selectedAnswer === true;
      }

      const progressWidth = (state.gameStep / lesson.exercises.length) * 100;
      
      let typeLabel = 'Quiz di Conoscenza';
      let typeIcon = 'brain';
      let typeColor = 'text-blue-700 bg-blue-50 border-blue-100';
      if(exercise.type === 'speak') { typeLabel = 'Esercizio di Pronuncia'; typeIcon = 'mic'; typeColor = 'text-pink-700 bg-pink-50 border-pink-100'; }
      else if(exercise.type === 'listen') { typeLabel = 'Esercizio di Ascolto'; typeIcon = 'headphones'; typeColor = 'text-indigo-700 bg-indigo-50 border-indigo-100'; }
      else if(exercise.type === 'conversation') { typeLabel = 'Scenario Reale'; typeIcon = 'message-square'; typeColor = 'text-orange-700 bg-orange-50 border-orange-100'; }

      let exerciseHtml = '';

      let contextHtml = '';
      if (exercise.type === 'conversation' && exercise.context) {
        contextHtml = `
          <div class="mb-10 w-full flex justify-start">
            <div class="chat-bubble bg-orange-50 border-2 border-orange-100 p-6 rounded-2xl rounded-bl-none shadow-sm relative w-11/12 md:w-3/4">
              <p class="text-orange-900 font-bold text-lg">${exercise.context}</p>
            </div>
          </div>
        `;
      }

      if (exercise.type === 'multiple_choice' || exercise.type === 'listen' || exercise.type === 'conversation') {
        exerciseHtml = `<div class="space-y-5">` + exercise.options.map((opt, i) => {
          let btnClass = "bg-white border-2 border-gray-200 text-gray-700 hover:border-pink-400 hover:bg-pink-50";
          let iconHtml = '';
          if (isAnswered) {
            if (i === exercise.answer) {
              btnClass = "bg-green-50 border-2 border-green-500 text-green-900 shadow-md transform scale-[1.02] z-10";
              iconHtml = `<i data-lucide="check-circle-2" class="text-green-500 w-8 h-8 animate-pop"></i>`;
            } else if (i === state.selectedAnswer) {
              btnClass = "bg-rose-50 border-2 border-rose-500 text-rose-900";
              iconHtml = `<i data-lucide="x-circle" class="text-rose-500 w-8 h-8"></i>`;
            } else {
              btnClass = "bg-gray-50 border-2 border-gray-100 text-gray-400 opacity-60";
            }
          }

          let optionAudioBtn = '';
          if (exercise.optionsHangul && exercise.optionsHangul[i]) {
            optionAudioBtn = `
              <button onclick="window.playAudio(event, '${exercise.optionsHangul[i]}')" class="p-3 md:p-4 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-200 transition-colors shrink-0 z-10 border border-blue-100 mr-2 shadow-sm">
                 <i data-lucide="volume-2" class="w-6 h-6"></i>
              </button>
            `;
          }

          return `
            <div class="relative w-full rounded-[1.2rem] transition-all cursor-pointer shadow-sm hover:shadow-md ${btnClass}" onclick="if(!${isAnswered}) window.handleMultipleChoiceAnswer(${i})">
              <div class="flex items-center w-full p-4 md:p-6 h-full">
                ${optionAudioBtn}
                <span class="font-black text-xl md:text-2xl flex-grow" style="${/[\u3131-\uD79D]/ugi.test(opt) ? "font-family: 'Noto Sans KR'" : ""}">${opt}</span>
                <div class="flex items-center gap-3 shrink-0 ml-4">
                  ${iconHtml}
                </div>
              </div>
            </div>
          `;
        }).join('') + `</div>`;
      } else if (exercise.type === 'speak') {
        const btnClasses = state.isRecording ? 'bg-pink-500 scale-110 shadow-2xl shadow-pink-500/50 animate-pulse border-white border-4' : isAnswered ? 'bg-gray-200 text-gray-400' : 'bg-blue-500 hover:bg-blue-600 text-white shadow-xl hover:scale-105 border-4 border-blue-200';
        const msg = state.isRecording ? "Ti ascolto... Parla chiaramente!" : isAnswered ? "Analisi completata." : "Tocca per parlare in Coreano";
        exerciseHtml = `
          <div class="flex flex-col items-center justify-center mt-12 space-y-8 bg-gray-50 p-10 rounded-[2rem] border-2 border-dashed border-gray-200">
            <button ${isAnswered || state.isRecording ? 'disabled' : ''} 
              onmousedown="window.handleSpeechRecognition(event)" 
              ontouchstart="window.handleSpeechRecognition(event)" 
              class="relative w-40 h-40 rounded-full flex items-center justify-center transition-all ${btnClasses} no-select">
              <i data-lucide="mic" class="w-16 h-16"></i>
            </button>
            <p class="text-gray-600 font-black text-center text-xl">${msg}</p>
          </div>
        `;
      }

      const feedbackClass = isCorrect ? 'bg-green-50 border-green-200 text-green-900' : 'bg-rose-50 border-rose-200 text-rose-900';
      const iconClass = isCorrect ? 'bg-green-500' : 'bg-rose-500';
      const iconType = isCorrect ? 'check' : 'message-circle-warning';
      const headingText = isCorrect ? 'Perfetto, Sara! 🎉' : 'Consiglio del Sensei 💡';
      const btnFeedClass = isCorrect ? 'bg-green-500 hover:bg-green-600 shadow-green-500/30' : 'bg-rose-500 hover:bg-rose-600 shadow-rose-500/30';
      const btnText = state.gameStep === lesson.exercises.length - 1 ? 'Termina Lezione' : 'Prossima Domanda';

      return `
      <div class="max-w-2xl mx-auto pb-20 mt-2 md:mt-6 animate-pop">
        
        <div class="flex justify-between items-center mb-6 px-2">
            <div class="flex items-center gap-2">
                <i data-lucide="flame" class="w-8 h-8 ${state.combo > 1 ? 'text-orange-500 animate-pulse' : 'text-gray-300'}"></i>
                <span class="font-black text-xl ${state.combo > 1 ? 'text-orange-600' : 'text-gray-400'}">Streak: ${state.combo}</span>
            </div>
            <span class="font-black text-gray-500 text-lg bg-white px-4 py-2 rounded-xl shadow-sm border border-gray-100">${state.gameStep + 1} / ${lesson.exercises.length}</span>
        </div>

        <div class="mb-8 flex items-center gap-4 bg-white p-3 rounded-2xl shadow-sm border border-gray-100">
          <div class="flex-grow bg-gray-100 h-5 rounded-xl overflow-hidden shadow-inner">
            <div class="bg-gradient-to-r from-blue-400 to-pink-500 h-full transition-all duration-700 ease-out" style="width: ${progressWidth}%"></div>
          </div>
        </div>

        <div class="bg-white rounded-[2.5rem] korean-shadow p-6 md:p-12 min-h-[550px] flex flex-col border border-blue-50 relative overflow-hidden">
          <div class="flex-grow z-10">
            <div class="flex justify-center mb-10">
               <span class="${typeColor} text-sm font-black px-6 py-2 rounded-full uppercase tracking-widest shadow-sm border flex items-center gap-2">
                 <i data-lucide="${typeIcon}" class="w-4 h-4"></i> ${typeLabel}
               </span>
            </div>

            ${exercise.type === 'listen' ? `
              <div class="flex justify-center mb-12">
                <button onclick="window.playAudio(event, '${exercise.audioHangul}')" class="flex items-center justify-center gap-3 bg-pink-500 hover:bg-pink-600 text-white px-10 py-5 rounded-full transition-transform hover:scale-105 shadow-xl shadow-pink-500/30">
                  <i data-lucide="volume-2" class="w-8 h-8 animate-pulse"></i><span class="font-black text-xl">Riproduci Audio</span>
                </button>
              </div>
            ` : ''}

            ${contextHtml}
            
            <h2 class="text-3xl md:text-4xl font-black text-gray-800 mb-12 text-center leading-snug">
              ${exercise.question}
            </h2>

            ${exerciseHtml}
          </div>

          <div class="mt-12 transition-all duration-500 z-10 ${isAnswered ? 'opacity-100 translate-y-0 block' : 'opacity-0 translate-y-4 hidden'}">
            <div class="p-6 md:p-8 rounded-[1.5rem] flex gap-5 items-start shadow-sm border-2 ${feedbackClass}">
              <div class="p-3 rounded-full text-white shrink-0 shadow-md ${iconClass}">
                  <i data-lucide="${iconType}" class="w-8 h-8"></i>
              </div>
              <div class="flex-grow">
                <h4 class="font-black text-2xl mb-2">${headingText}</h4>
                <p class="font-bold text-lg">${isCorrect ? "Ottimo lavoro! Continua così." : exercise.feedback_incorrect}</p>
              </div>
            </div>
            <button onclick="window.nextQuestion()" class="w-full mt-6 py-6 rounded-2xl font-black text-2xl text-white shadow-xl transition-transform transform hover:scale-[1.02] ${btnFeedClass}">
              ${btnText}
            </button>
          </div>
        </div>
      </div>
      `;
    };

    const renderResult = () => {
      const lesson = COURSE_DATA.find(d => d.day === state.activeDay);
      const total = lesson.exercises.length;
      const isPerfect = state.score === total;

      const mistakesHtml = state.currentMistakes.length > 0 
        ? `<div class="bg-rose-50 border-2 border-rose-200 text-rose-900 p-6 rounded-2xl mb-10 text-left shadow-sm">
             <span class="font-black block mb-3 text-lg flex items-center gap-2"><i data-lucide="book-open" class="w-6 h-6"></i> Concetti da rivedere:</span>
             <ul class="list-disc pl-6 font-bold space-y-2 text-rose-800">
               ${[...new Set(state.currentMistakes)].map(m => `<li>${m}</li>`).join('')}
             </ul>
           </div>` 
        : '';

      return `
      <div class="max-w-lg mx-auto mt-12 text-center px-4 animate-pop">
        <div class="bg-white rounded-[3rem] korean-shadow p-10 md:p-16 border border-blue-50 relative overflow-hidden">
          
          <div class="absolute inset-0 z-0 pointer-events-none opacity-20 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+PGNpcmNsZSBjeD0iMjAiIGN5PSIyMCIgcj0iMiIgZmlsbD0iI2QxZDVkYiIvPjwvc3ZnPg==')]"></div>

          <div class="w-32 h-32 bg-gradient-to-br from-yellow-300 via-yellow-400 to-orange-500 text-white rounded-full flex items-center justify-center mx-auto mb-8 shadow-2xl shadow-yellow-500/40 relative z-10 animate-pop">
            <i data-lucide="trophy" class="w-16 h-16"></i>
          </div>
          <h2 class="text-5xl font-black text-gray-900 mb-3 relative z-10">Bravissima!</h2>
          <p class="text-blue-500 mb-10 font-black uppercase tracking-widest text-sm relative z-10">Giorno ${state.activeDay}: ${lesson.topic}</p>
          
          <div class="text-[5rem] font-black text-pink-500 mb-6 drop-shadow-md relative z-10 leading-none">${state.score}<span class="text-4xl text-gray-400">/${total}</span></div>
          
          ${mistakesHtml}

          <p class="text-xl font-bold text-gray-600 mb-12 leading-relaxed relative z-10">
            ${isPerfect ? "Sei una forza della natura, Sara! Zero errori. 🌸" : "Ottimo sforzo! La costanza è il vero segreto della fluidità."}
          </p>
          <button onclick="window.changeView('dashboard')" class="w-full bg-gray-900 hover:bg-black text-white py-6 rounded-2xl font-black text-2xl shadow-xl transition-transform transform hover:scale-[1.02] relative z-10 flex justify-center items-center gap-3">
            <i data-lucide="map" class="w-7 h-7"></i> Torna al Percorso
          </button>
        </div>
      </div>
      `;
    };

    const renderLibrary = () => {
      let html = `
      <div class="max-w-5xl mx-auto pb-24 mt-2 md:mt-6 animate-pop">
        
        <div class="bg-white p-8 md:p-10 rounded-[2.5rem] korean-shadow border border-blue-50 mb-12 relative overflow-hidden">
          <div class="absolute right-0 top-0 w-64 h-64 bg-gradient-to-bl from-pink-50 to-transparent rounded-bl-full -z-10"></div>
          
          <h2 class="text-3xl font-black text-gray-900 mb-3 flex items-center gap-3">
            <div class="p-3 bg-pink-100 text-pink-600 rounded-2xl"><i data-lucide="bot" class="w-8 h-8"></i></div> 
            Traduttore Intelligente
          </h2>
          <p class="text-gray-500 font-bold mb-8 text-lg">Scrivi una frase in Italiano per ottenere la traduzione in Coreano, con pronuncia.</p>
          
          <div class="flex flex-col md:flex-row gap-4 mb-4 z-10 relative">
            <input type="text" id="transInput" value="${state.transInput}" onchange="state.transInput = this.value" placeholder="es., Dov'è la stazione?" class="flex-grow border-2 border-gray-200 rounded-2xl p-5 text-xl font-bold text-gray-800 focus:border-pink-500 focus:ring-4 focus:ring-pink-100 outline-none transition-all shadow-sm" />
            <button onclick="window.runTranslation()" class="bg-pink-500 hover:bg-pink-600 text-white px-10 py-5 rounded-2xl font-black text-xl transition-transform hover:scale-105 shadow-xl shadow-pink-500/30 flex justify-center items-center gap-3">
              ${state.transLoading ? `<i data-lucide="loader-2" class="animate-spin w-6 h-6"></i>` : `<i data-lucide="languages" class="w-6 h-6"></i> Traduci`}
            </button>
          </div>
          
          ${state.transResult ? `
            <div class="mt-8 bg-gray-900 p-8 rounded-[1.5rem] flex flex-col md:flex-row justify-between items-start md:items-center gap-6 shadow-2xl animate-pop border border-gray-800">
              <div>
                 <span class="text-3xl md:text-4xl font-black text-white block mb-2" style="font-family: 'Noto Sans KR'">${state.transResult}</span>
                 <span class="text-xl font-bold text-blue-300 tracking-wide">${state.transRomaji}</span>
              </div>
              <button onclick="window.playAudio(event, '${state.transResult}')" class="bg-blue-500 hover:bg-blue-400 shadow-lg text-white p-5 rounded-full transition-transform hover:scale-110 shrink-0 w-full md:w-auto flex justify-center">
                <i data-lucide="volume-2" class="w-8 h-8"></i>
              </button>
            </div>
          ` : ''}
        </div>

        <div class="bg-gradient-to-r from-blue-400 to-pink-400 text-white rounded-[2.5rem] p-10 md:p-12 mb-12 shadow-xl text-center md:text-left relative overflow-hidden">
          <i data-lucide="book-marked" class="absolute right-0 bottom-0 w-64 h-64 opacity-10 transform translate-x-10 translate-y-10"></i>
          <h1 class="text-4xl md:text-5xl font-black mb-4 flex items-center justify-center md:justify-start gap-4 relative z-10">
             Guida di Sopravvivenza 🎒
          </h1>
          <p class="text-blue-50 text-xl font-bold relative z-10">Queste parole coprono il 90% delle interazioni base in Corea.</p>
        </div>
        <div class="space-y-16">
      `;

      LIBRARY_DATA.forEach(section => {
        let itemsHtml = section.items.map(item => `
          <div class="bg-white p-8 rounded-[1.5rem] shadow-sm border-2 border-gray-50 flex flex-col justify-between hover:shadow-xl hover:-translate-y-1 hover:border-pink-100 transition-all group">
            <div class="mb-4">
              <div class="flex justify-between items-start mb-4 gap-4">
                <div>
                  <p class="text-3xl font-black text-gray-900 mb-2 group-hover:text-pink-600 transition-colors" style="font-family: 'Noto Sans KR'">${item.hangul}</p>
                  <p class="text-sm font-black text-blue-500 uppercase tracking-widest">${item.romaji}</p>
                </div>
                <button onclick="window.playAudio(event, '${item.hangul}')" class="shrink-0 flex items-center justify-center gap-2 bg-gray-50 hover:bg-pink-50 border border-gray-200 hover:border-pink-200 text-gray-700 hover:text-pink-700 p-4 rounded-full transition-all shadow-sm">
                  <i data-lucide="volume-2" class="w-6 h-6"></i>
                </button>
              </div>
              <p class="text-gray-700 font-black text-xl mb-5">"${item.eng}"</p>
              <div class="bg-gray-50 p-5 rounded-2xl border border-gray-100">
                <span class="text-[11px] font-black text-pink-500 uppercase tracking-widest block mb-2 flex items-center gap-1"><i data-lucide="info" class="w-4 h-4"></i> Nota</span>
                <p class="text-gray-600 text-base font-bold leading-relaxed">${item.context}</p>
              </div>
            </div>
          </div>
        `).join('');

        html += `
          <section>
            <h2 class="text-3xl font-black text-gray-800 mb-8 flex items-center gap-3 border-b-4 border-gray-100 pb-4 inline-flex">
              <div class="p-2 bg-gray-100 rounded-xl"><i data-lucide="${section.icon}" class="${section.iconColor} w-8 h-8"></i></div>
              ${section.category}
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
              ${itemsHtml}
            </div>
          </section>
        `;
      });

      html += `</div></div>`;
      return html;
    };

    const renderProfile = () => `
      <div class="max-w-md mx-auto mt-10 md:mt-20 px-4 pb-20 animate-pop">
        <div class="bg-white rounded-[3rem] korean-shadow p-10 border border-blue-50 text-center relative overflow-hidden">
          
          <div class="w-32 h-32 bg-pink-50 text-pink-600 rounded-full flex items-center justify-center mx-auto mb-8 border-8 border-white shadow-xl relative z-10">
            <i data-lucide="user" class="w-16 h-16"></i>
          </div>
          <h2 class="text-4xl font-black text-gray-900 mb-2">Profilo Studente</h2>
          <p class="text-gray-500 mb-12 font-bold text-lg">I tuoi progressi sono salvati automaticamente.</p>
          
          <div class="text-left mb-10">
            <label class="block text-sm font-black text-gray-500 mb-3 uppercase tracking-widest">Il Tuo Nome</label>
            <input 
              type="text" 
              value="${state.profileName}"
              onchange="window.updateProfileName(this.value)"
              class="w-full border-2 border-gray-200 rounded-2xl p-5 text-2xl font-black text-gray-800 focus:border-pink-500 outline-none transition-colors shadow-inner bg-gray-50 focus:bg-white"
            />
          </div>

          <div class="bg-gray-900 p-8 rounded-3xl mb-12 flex justify-between items-center text-left shadow-xl">
            <div>
              <p class="text-gray-400 text-xs font-black uppercase tracking-widest mb-1">Giorni Completati</p>
              <p class="text-5xl font-black text-pink-400">${state.completedDays.length}</p>
            </div>
            <i data-lucide="award" class="text-yellow-400 w-16 h-16"></i>
          </div>

          <button onclick="window.handleSwitchAccount()" class="w-full bg-white border-2 border-gray-200 hover:bg-gray-50 hover:border-gray-300 text-gray-800 py-5 rounded-2xl font-black text-lg shadow-sm transition-all flex justify-center items-center gap-3">
            <i data-lucide="log-out" class="w-6 h-6"></i> Resetta Progressi
          </button>
        </div>
      </div>
    `;

    // Boot App
    initApp();

  </script>
</body>
</html>
